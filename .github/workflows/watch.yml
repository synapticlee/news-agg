name: PR watch
on:
  schedule:
    # - cron: "*/5 * * * *"   # best-effort; expect 5-15 min jitter
  workflow_dispatch: {}       # manual trigger for testing
permissions:
  contents: write             # commit seen.json / pages/
  issues: write               # issue-notification mode
concurrency:
  group: pr-watch
  cancel-in-progress: false
jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install feedparser pyyaml
      - run: python watcher.py
        env:
          # Set ONE of these secret groups, or neither for issue mode:
          # Resend:  RESEND_API_KEY + MAIL_TO (+ optional MAIL_FROM)
          # SMTP:    SMTP_HOST + SMTP_PORT + SMTP_USER + SMTP_PASS + MAIL_TO
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
      - name: Notify via GitHub issue (no-email mode)
        if: ${{ hashFiles('digest.md') != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create pr-watch --force --color 1d76db 2>/dev/null || true
          # For guaranteed notification regardless of watch settings, set
          # your username here (assignment always triggers a notification):
          ASSIGNEE=""   # e.g. ASSIGNEE="--assignee your-username"
          gh issue create \
            --title "PR watch: new items $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --body-file digest.md \
            --label pr-watch $ASSIGNEE
          rm digest.md
      - name: Commit state
        run: |
          git config user.name "pr-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add seen.json pages/ 2>/dev/null || git add seen.json
          git diff --cached --quiet || git commit -m "update seen state [skip ci]"
          git pull --rebase && git push
