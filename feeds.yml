# Press release watcher config
#
# status values:
#   verified   - I checked this URL resolves to a real feed (as of 2026-07-13)
#   candidate  - plausible/commonly-cited URL, NOT verified. Run:
#                  python watcher.py --validate
#                to test every feed and see which are live.
#
# EDGAR 8-K feeds are generated automatically from `edgar_tickers` below —
# pattern: https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK={ticker}&type=8-K&output=atom
# Google News feeds are generated from `gnews_queries`.
#
# Full --validate pass done 2026-07-13: 12 of 40 feeds were dead. Fixed URLs
# where a live replacement was found, removed entries with no replacement,
# and marked everything else that resolved live as `verified`.

feeds:
  # ---- verified newsroom feeds ----
  - name: Apple Newsroom
    url: https://www.apple.com/newsroom/rss-feed.rss
    status: verified
  - name: NVIDIA Newsroom
    url: https://nvidianews.nvidia.com/rss.xml
    status: verified

  # ---- candidates: validate before trusting ----
  - name: Microsoft News
    url: https://news.microsoft.com/feed/
    status: verified
  - name: Official Microsoft Blog
    url: https://blogs.microsoft.com/feed/
    status: verified
  - name: Microsoft Security Blog
    url: https://www.microsoft.com/en-us/security/blog/feed/
    status: verified
    keywords: [ransomware, breach, nation-state, zero-day, AI, Copilot,
               threat, attack, vulnerability]
  # Microsoft MSRC Blog RSS is gone (blog moved to microsoft.com/en-us/msrc/blog
  # in 2026 with no discoverable feed) — see the page-diff entry below instead.
  - name: Azure Status
    # Often legitimately shows 0 entries when there's no active incident —
    # --validate flags 0-entry feeds as "dead", but the URL/XML is fine.
    url: https://azure.status.microsoft/en-us/status/feed/
    status: verified
  - name: Google (The Keyword)
    url: https://blog.google/rss/
    status: verified
  - name: Meta Newsroom
    url: https://about.fb.com/feed/
    status: verified
  # AI at Meta Blog RSS (ai.meta.com/blog/rss/) is dead (404) — the page-diff
  # entry below ("AI at Meta blog listing") already covers this blog.
  - name: Amazon News
    url: https://www.aboutamazon.com/news/rss
    status: verified
  - name: OpenAI News
    url: https://openai.com/news/rss.xml
    status: verified   # checked 2026-07-13 (1040 entries)
  - name: xAI / SpaceXAI News (scraped, unofficial)
    # x.ai/news has no official RSS; this feed is generated hourly by
    # github.com/Olshansk/rss-feeds via GitHub Actions
    url: https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_xainews.xml
    status: verified
  # AMD Press Releases (www.amd.com/en/newsroom.rss) removed: the server
  # actively resets the HTTP/2 connection for automated fetches (bot
  # mitigation, not a moved URL) — no working alternative found. AMD IR
  # press releases below + the EDGAR AMD 8-K feed cover the material news.
  - name: AMD Investor Relations press releases
    # fixed 2026-07-13: old /rss/press-releases.xml guess 404'd; this is the
    # real URL (ir.amd.com/rss/news-releases.xml 301-redirects to it too)
    url: https://ir.amd.com/news-events/press-releases/rss
    status: verified   # checked 2026-07-13 (10 entries)
  # AMD ROCm Blog (rocm.blogs.amd.com/atom.xml) removed: 404, and no feed
  # link discoverable on the blog itself as of 2026-07-13 — re-check later.
  - name: Intel Newsroom
    url: https://newsroom.intel.com/feed/
    status: verified
  - name: IBM Newsroom
    # fixed 2026-07-13: old ?pagetemplate=rss path used "press-releases",
    # the live site uses "announcements"
    url: https://newsroom.ibm.com/announcements?pagetemplate=rss
    status: verified   # checked 2026-07-13 (5 entries)
  - name: Hugging Face Blog
    url: https://huggingface.co/blog/feed.xml
    status: verified

  # ---- Shopify ----
  # Shopify Newsroom (shopify.com/news.rss) and Shopify Engineering Blog
  # (shopify.engineering/blog.atom) both removed: dead (404s), and no
  # feed link discoverable on either site as of 2026-07-13.
  - name: Shopify Changelog   # product/API changes, incl. AI features
    # fixed 2026-07-13: real path is /feed, not /rss
    url: https://changelog.shopify.com/feed
    status: verified   # checked 2026-07-13 (1551 entries)

  # ---- Cloudflare ----
  - name: Cloudflare Blog
    url: https://blog.cloudflare.com/rss/
    status: verified
  - name: Cloudflare Status (incidents)
    url: https://www.cloudflarestatus.com/history.rss
    status: verified
  # Cloudflare product changelog feeds (official, documented):
  # https://developers.cloudflare.com/fundamentals/new-features/available-rss-feeds/
  # — grab the "all products" feed URL from that page if you want it.

  # ---- cybersecurity / ransomware (general-audience signal) ----
  - name: Krebs on Security
    url: https://krebsonsecurity.com/feed/
    status: verified
  - name: The Record (Recorded Future News)
    url: https://therecord.media/feed
    status: verified
  - name: BleepingComputer
    url: https://www.bleepingcomputer.com/feed/
    status: verified
    # high volume — filtered to stories a general AI/tech audience cares about
    keywords: [ransomware, breach, breached, hacked, zero-day, extortion,
               leak, outage, Microsoft, Google, Apple, OpenAI, Anthropic,
               Cloudflare, NVIDIA, AI]
  - name: CISA Advisories
    url: https://www.cisa.gov/cybersecurity-advisories/all.xml
    status: verified

  # ---- crypto / bitcoin ----
  - name: CoinDesk
    url: https://www.coindesk.com/arc/outboundfeeds/rss/
    status: verified
    keywords: [Bitcoin, SEC, CFTC, ETF, Coinbase, hack, stolen, Polymarket,
               Kalshi, stablecoin, Treasury, regulation]
  - name: The Block
    url: https://www.theblock.co/rss.xml
    status: verified
    keywords: [Bitcoin, SEC, CFTC, ETF, hack, Polymarket, Kalshi, regulation]

  # ---- X / Twitter accounts (unofficial RSS bridge — fragile) ----
  # X has no free official RSS. These use xcancel.com, a Nitter-style
  # front-end that mirrors X profiles as RSS (/{handle}/rss). Nitter-style
  # instances get rate-limited or die without notice — if these start
  # failing validation, find a live instance at
  # https://github.com/zedeus/nitter/wiki/Instances (or search "nitter
  # instance status") and swap the domain below.
  # Note: xcancel.com's /rss currently returns only the single latest post
  # per account (not a full recent timeline) — fine at a 5-min poll cadence,
  # but a burst of several posts between polls will only surface the last one.
  - name: "X: @sama"
    url: https://xcancel.com/sama/rss
    status: verified   # checked 2026-07-13
  - name: "X: @DarioAmodei"
    url: https://xcancel.com/DarioAmodei/rss
    status: verified   # checked 2026-07-13
  - name: "X: @elonmusk"
    url: https://xcancel.com/elonmusk/rss
    status: verified   # checked 2026-07-13
  - name: "X: @OpenAI"
    url: https://xcancel.com/OpenAI/rss
    status: verified   # checked 2026-07-13
  - name: "X: @AnthropicAI"
    url: https://xcancel.com/AnthropicAI/rss
    status: verified   # checked 2026-07-13
  - name: "X: @xai"
    url: https://xcancel.com/xai/rss
    status: verified   # checked 2026-07-13

  # ---- Hacker News (community-curated "top news", filtered to our topics) ----
  # hnrss.org is a long-running third-party bridge over HN's official Algolia
  # search API — same "unofficial RSS bridge" pattern as xcancel.com above.
  # `points=` is hnrss's own quality floor; `keywords` (our existing filter)
  # then cuts the frontpage down to just AI/big-tech/security/crypto stories.
  - name: Hacker News (front page, filtered)
    url: https://hnrss.org/frontpage?points=100
    status: verified   # checked 2026-07-13 (curl, HTTP 200)
    keywords: [AI, Anthropic, Claude, OpenAI, ChatGPT, GPT, Grok, xAI, Gemini,
               DeepMind, Mistral, LLM, agent, NVIDIA, Microsoft, Copilot,
               Google, Meta, Apple, Amazon, AWS, Cloudflare, breach,
               ransomware, hack, hacked, exploit, vulnerability, zero-day,
               outage, layoffs, Bitcoin, crypto, SEC]

  # ---- Reddit (top-of-day across relevant subreddits, filtered) ----
  # www.reddit.com/*.rss 429s on direct fetches (confirmed 2026-07-13) even
  # at a polite polling cadence — old.reddit.com does not. If old.reddit
  # ever starts 429ing too, split this into one feed per subreddit (lower
  # per-request volume) before assuming Reddit killed RSS entirely.
  - name: Reddit (top of day, filtered)
    url: https://old.reddit.com/r/technology+artificial+singularity+programming+hardware/top/.rss?t=day&limit=25
    status: verified   # checked 2026-07-13 (curl, HTTP 200 on the single-sub form; multi-sub form untested live due to rate-limit hit while testing — same UA/cadence should be fine at 5-min polling)
    keywords: [AI, Anthropic, Claude, OpenAI, ChatGPT, GPT, Grok, xAI, Gemini,
               DeepMind, Mistral, LLM, agent, NVIDIA, Microsoft, Copilot,
               Google, Meta, Apple, Amazon, AWS, Cloudflare, breach,
               ransomware, hack, hacked, exploit, vulnerability, zero-day,
               outage, layoffs, Bitcoin, crypto, SEC]

# Single pages that get appended/edited in place (release notes, changelogs,
# pricing pages). Content is fetched, text-extracted, stored in pages/, and
# a unified diff is emailed on change. First run stores a baseline silently.
# JSON endpoints behind pages — the most robust way to track sites without
# feeds. Find them in browser DevTools -> Network -> XHR/Fetch.
# Job boards are the marquee use: new postings leak strategy early.
# Greenhouse pattern: https://boards-api.greenhouse.io/v1/boards/{slug}/jobs
#   (find the slug in the careers page URL: boards.greenhouse.io/{slug})
# Lever pattern:      https://api.lever.co/v0/postings/{slug}?mode=json
json_endpoints:
  # Slugs below are guesses from company names — confirm each from the
  # careers page URL (boards.greenhouse.io/{slug} or jobs.lever.co/{slug});
  # a wrong slug just logs "json fetch failed" and is skipped.
  - name: Anthropic job postings
    url: https://boards-api.greenhouse.io/v1/boards/anthropic/jobs
    items_path: jobs
    id_field: id
    title_field: title
    link_field: absolute_url
  - name: Scale AI job postings
    url: https://boards-api.greenhouse.io/v1/boards/scaleai/jobs
    items_path: jobs
    id_field: id
    title_field: title
    link_field: absolute_url
  - name: Cerebras job postings
    url: https://boards-api.greenhouse.io/v1/boards/cerebras/jobs
    items_path: jobs
    id_field: id
    title_field: title
    link_field: absolute_url
  - name: Mistral job postings (Lever)
    url: https://api.lever.co/v0/postings/mistral?mode=json
    items_path: ""          # Lever returns a bare list
    id_field: id
    title_field: text
    link_field: hostedUrl
  # Other patterns:
  #   Lever:  https://api.lever.co/v0/postings/{slug}?mode=json
  #   Ashby:  https://api.ashbyhq.com/posting-api/job-board/{org}
  #           (items_path: jobs, id_field: id, title_field: title,
  #            link_field: jobUrl — OpenAI and several labs use Ashby)

pages:
  - name: AI at Meta blog listing
    url: https://ai.meta.com/blog/
    # fallback for the feed-less blog; diff fires on new post titles.
  - name: Microsoft MSRC blog listing
    url: https://www.microsoft.com/en-us/msrc/blog
    # fallback added 2026-07-13 after the MSRC blog's RSS feed went dead
    # (moved off msrc.microsoft.com with no feed re-advertised)
  - name: TrueUp layoffs tracker
    url: https://www.trueup.io/layoffs
    # drop live counters so diffs fire only when the layoffs list changes
    ignore:
      - 'people impacted'
      - 'people per day'
      - 'open jobs'
      - 'As of \w+ \d+'
      - 'Loading latest'
  - name: Claude release notes (support article)
    url: https://support.claude.com/en/articles/12138966-release-notes
  - name: ChatGPT release notes (help article)
    # URL unverified — find the "ChatGPT — Release Notes" article on
    # help.openai.com and paste its URL here
    url: https://help.openai.com/en/articles/6825453-chatgpt-release-notes
  # Tip: GitHub repos need no diffing — native atom feeds exist:
  #   releases:  https://github.com/anthropics/claude-code/releases.atom
  #   commits:   https://github.com/{owner}/{repo}/commits/{branch}.atom
  # Add those to `feeds:` above instead.

# Help centers and docs sites have no RSS, but new pages appear in their
# sitemap.xml — and support articles often go live BEFORE announcements.
# All URLs below except platform.claude.com are the standard Intercom /
# common pattern and are unverified: test with a --dry-run.
# `include` filters to a URL substring; `track_updates: true` also alerts
# when an existing page's <lastmod> changes (quiet edits).
sitemaps:
  - name: Claude support articles
    url: https://support.claude.com/sitemap.xml
    include: /articles/
    track_updates: true
  - name: Claude platform docs   # verified to exist (Jan 2026, ~2,525 URLs)
    url: https://platform.claude.com/sitemap.xml
    include: /docs/
  - name: OpenAI help articles
    url: https://help.openai.com/sitemap.xml
    include: /articles/
    track_updates: true
  - name: Gemini support (Google)
    url: https://support.google.com/gemini/sitemap.xml
    include: ""
  - name: xAI docs
    url: https://docs.x.ai/sitemap.xml
    include: ""
  - name: Mistral help
    url: https://help.mistral.ai/sitemap.xml
    include: /articles/

# US-listed tickers -> EDGAR 8-K atom feeds (material events, incl. Ex-99.1
# press releases). Reliable and near-real-time. Add/remove freely.
edgar_tickers:
  - AAPL   # Apple
  - MSFT   # Microsoft
  - GOOGL  # Alphabet
  - AMZN   # Amazon
  - META   # Meta
  - NVDA   # NVIDIA
  - TSLA   # Tesla
  - AMD
  - INTC   # Intel
  - TSM    # TSMC (files 6-K not 8-K; handled below)
  - AVGO   # Broadcom
  - QCOM   # Qualcomm
  - MU     # Micron
  - 1973239  # Arm Holdings plc — ticker "ARM" doesn't resolve via EDGAR's
             # ticker lookup, numeric CIK required (files 6-K, see below)
  - ASML   # ASML (6-K)
  - ORCL   # Oracle
  - PLTR   # Palantir
  - SMCI   # Supermicro
  - 1769628  # CoreWeave — ticker "CRWV" doesn't resolve via EDGAR's ticker
             # lookup, numeric CIK required (files 8-K, domestic issuer)
  - NET    # Cloudflare
  - CRWD   # CrowdStrike (cybersecurity bellwether)
  - PANW   # Palo Alto Networks
  - COIN   # Coinbase
  - MSTR   # Strategy (largest corporate bitcoin holder)
  - SHOP   # Shopify (Canadian but a US domestic filer since ~2021, so 8-K
           # should be right — if the feed comes back empty, check EDGAR
           # and move it to edgar_6k_tickers)
  # - ????   # SpaceX (public since June 2026, now owns xAI/Grok as "SpaceXAI").
  #          # Ticker not verified — look up via EDGAR company search for
  #          # "Space Exploration Technologies"; the CIK works in the feed URL too.

# Foreign private issuers file 6-K instead of 8-K
edgar_6k_tickers:
  - TSM
  - ASML
  - 1973239  # Arm Holdings plc (must match the numeric CIK used above)

# Private / no-RSS companies -> Google News RSS query feeds.
# Quoted phrases keep results tight; add "press release" or site: terms
# if too noisy.
gnews_queries:
  - '"Anthropic"'
  - '"OpenAI"'
  - '"Mistral AI"'
  - '"SpaceXAI" OR "xAI"'
  - '"Grok" AI'
  - '"Cerebras"'
  - '"Groq"'
  - '"Scale AI"'
  - '"Databricks"'
  - '"SambaNova"'
  - '"Polymarket" OR "Kalshi" OR "prediction market"'
  # --- hires / departures / layoffs (dict form = keyword-filtered:
  # every result is fetched but only titles matching a keyword alert) ---
  - query: 'OpenAI OR Anthropic OR "Google DeepMind" OR "SpaceXAI" OR "Meta AI"'
    keywords: [hires, hired, joins, joining, departs, departing, leaves,
               leaving, poach, resigns, steps down, layoffs, laid off,
               cuts, exits, appointed, named]
  - query: 'NVIDIA OR Microsoft OR AMD OR Intel OR TSMC layoffs'
    keywords: [layoffs, laid off, cuts, restructuring, WARN]
  # --- executive tracking (active — news coverage of a CEO's X posts/
  # statements acts as a significance filter — trivial posts don't get
  # written up, consequential ones do within the hour. Complements the
  # direct X account feeds above: this catches when someone else's post
  # about the exec blows up, not just their own posts) ---
  - '"Sam Altman"'
  - '"Dario Amodei"'
  - '"Jensen Huang"'
  - '"Demis Hassabis"'
  - '"Lisa Su" AMD'
  - '"Musk" AND ("Grok" OR "SpaceXAI")'
  - query: '"Polymarket" OR "Kalshi" OR "prediction market"'
    exclude:
      - "promo code"
      - "invite code"
      - "\\$\\d+ (off|bonus)"
